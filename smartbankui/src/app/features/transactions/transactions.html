<div class="transactions-page">
  <div class="header">
    <h1>Transaction History</h1>
    <p>Track all your credit and debit transactions</p>
  </div>

  <div class="table-card">
    <table *ngIf="transactions.length > 0">
      <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Amount</th>
          <th>Description</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let txn of transactions">
          <td>{{ txn.createdAt || txn.timestamp | date:'medium' }}</td>
          <td>
            <span [class.credit]="txn.type === 'CREDIT'" [class.debit]="txn.type === 'DEBIT'">
              {{ txn.type }}
            </span>
          </td>
          <td>₹ {{ txn.amount }}</td>
          <td>{{ txn.description || 'Bank transaction' }}</td>
        </tr>
      </tbody>
    </table>

    <div class="empty" *ngIf="transactions.length === 0 && !errorMessage">
      No transactions found.
    </div>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </div>
</div>
