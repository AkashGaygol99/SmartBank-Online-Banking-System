<div class="users-page">
  <div class="header">
    <h1>Registered Users</h1>
    <p>All SmartBank customers and administrators</p>
  </div>

  <div class="table-card">
    <table *ngIf="users.length > 0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.id }}</td>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>
            <span>{{ user.role }}</span>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="empty" *ngIf="users.length === 0">
      No users found.
    </div>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </div>
</div>
