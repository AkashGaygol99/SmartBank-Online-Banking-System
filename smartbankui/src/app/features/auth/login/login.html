<div class="auth-page">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p>Login to access your SmartBank account</p>

    <form (ngSubmit)="login()">
      <input
        type="email"
        name="email"
        placeholder="Email address"
        [(ngModel)]="loginData.email"
        required
      />

      <input
        type="password"
        name="password"
        placeholder="Password"
        [(ngModel)]="loginData.password"
        required
      />

      <button type="submit">Login</button>
    </form>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <p class="link-text">
      New customer?
      <a routerLink="/register">Create account</a>
    </p>

  </div>
</div>
